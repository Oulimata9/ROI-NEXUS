version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roi_nexus
    volumes:
      - db_data:/var/lib/postgresql/data
    # Change host port if default 5432 is already in use
    ports:
      - "5433:5432"  # expose container port 5432 on host port 5433

  backend:
    build:
      context: ./backends
    restart: unless-stopped
    env_file:
      - .env.backend
    depends_on:
      - db
    volumes:
      - ./backends/app:/code/app
      - ./backends/requirements.txt:/code/requirements.txt:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:
