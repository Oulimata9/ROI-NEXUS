version: '3.8'
services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roi_nexus
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d roi_nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backends
    restart: unless-stopped
    env_file:
      - .env.backend
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backends/app:/code/app
      - ./backends/alembic:/code/alembic
      - ./backends/alembic.ini:/code/alembic.ini:ro
      - ./backends/requirements.txt:/code/requirements.txt:ro
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  db_data:
